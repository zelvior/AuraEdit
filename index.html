<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Edit — Advanced Modern Code Editor</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Aura Edit design tokens — exactly five colors, used everywhere -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['"JetBrains Mono"', '"Courier New"', 'Courier', 'monospace'],
                    },
                    colors: {
                        canvas: '#0D0F13',  // Primary Background
                        surface: '#16191E', // Surface / Cards
                        muted: '#6B727E',   // Secondary Text
                        ink: '#E1E4E8',     // Primary Text
                        accent: '#C5A059',  // Accent
                    }
                }
            }
        };
    </script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Inter (UI) + JetBrains Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Prism Syntax Highlighting Base -->
    <link id="prism-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">

    <style>
        :root {
            --c-canvas: #0D0F13;
            --c-surface: #16191E;
            --c-muted: #6B727E;
            --c-ink: #E1E4E8;
            --c-accent: #C5A059;
        }

        body {
            font-family: 'Inter', sans-serif;
        }

        /* Essential overlay editor styling */
        .editor-container {
            position: relative;
            font-family: 'JetBrains Mono', 'Courier New', Courier, monospace;
        }

        #editing-area, #highlight-pre {
            margin: 0 !important;
            padding: 16px !important;
            border: 0 !important;
            font-family: 'JetBrains Mono', 'Courier New', Courier, monospace !important;
            font-size: 14px;
            line-height: 24px !important;
            tab-size: 4;
            -moz-tab-size: 4;
            white-space: pre !important;
            word-wrap: normal !important;
            overflow: auto !important;
            border-radius: 0 !important;
            box-sizing: border-box !important;
        }

        /* Overlay textarea directly on top of the syntax code block */
        #editing-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: transparent !important;
            background: transparent !important;
            caret-color: var(--c-accent);
            resize: none;
            z-index: 2;
            overflow-x: auto !important;
            overflow-y: auto !important;
        }

        #highlight-pre {
            position: relative;
            width: 100%;
            height: 100%;
            background: transparent !important;
            z-index: 1;
            pointer-events: none;
            overflow: hidden !important; /* Managed by JS scroll syncing */
        }

        #highlight-code {
            font-family: 'JetBrains Mono', 'Courier New', Courier, monospace !important;
            background: transparent !important;
            font-size: 14px;
            line-height: 24px !important;
            display: block;
            pointer-events: none;
        }

        /* Hide default scrollbars from highlight pre since textarea handles scrolls */
        #highlight-pre::-webkit-scrollbar {
            display: none;
        }

        /* Smooth adjustments for theme transitions */
        .transition-theme {
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }

        /* Scrollbar design — uses only the Aura palette */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--c-canvas);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--c-surface);
            border-radius: 4px;
            border: 1px solid rgba(225, 228, 232, 0.05);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--c-accent);
            opacity: 0.6;
        }

        /* Line numbers sidebar */
        .line-num-container {
            font-family: 'JetBrains Mono', 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 24px;
            user-select: none;
            text-align: right;
            padding-top: 16px;
            padding-bottom: 16px;
        }

        /* ---- Prism token overrides: restrict syntax highlighting to the Aura palette ---- */
        code[class*="language-"], pre[class*="language-"] {
            color: var(--c-ink) !important;
            background: transparent !important;
            text-shadow: none !important;
            font-family: 'JetBrains Mono', 'Courier New', Courier, monospace !important;
        }
        .token.comment,
        .token.prolog,
        .token.doctype,
        .token.cdata,
        .token.punctuation {
            color: var(--c-muted) !important;
        }
        .token.property,
        .token.tag,
        .token.boolean,
        .token.number,
        .token.constant,
        .token.symbol,
        .token.deleted,
        .token.function,
        .token.class-name,
        .token.selector,
        .token.attr-name,
        .token.keyword,
        .token.operator,
        .token.entity,
        .token.url,
        .token.variable,
        .language-css .token.string,
        .style .token.string,
        .token.builtin,
        .token.important,
        .token.atrule {
            color: var(--c-accent) !important;
        }
        .token.selector,
        .token.attr-name,
        .token.string,
        .token.char,
        .token.inserted,
        .token.regex {
            color: var(--c-ink) !important;
        }
        .token.bold, .token.important { font-weight: 600; }
        .token.italic { font-style: italic; }
    </style>
</head>
<body class="h-full flex flex-col transition-theme overflow-hidden bg-canvas text-ink font-sans">


    <!-- Top Navigation Header -->
    <header class="h-14 border-b px-4 flex items-center justify-between z-10 transition-theme border-ink/10 bg-canvas">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-accent flex items-center justify-center text-canvas shadow-md shadow-accent/20">
                <i class="fa-solid fa-code text-sm"></i>
            </div>
            <div>
                <h1 class="font-bold text-sm tracking-tight text-ink flex items-center gap-2">
                    Aura Edit
                    <span class="text-[10px] font-semibold px-1.5 py-0.5 rounded bg-accent/10 text-accent">v1.2.0</span>
                </h1>
            </div>
        </div>

        <!-- Toolbar Actions -->
        <div class="flex items-center gap-2">
            <!-- Language Select -->
            <div class="relative">
                <label for="language-select" class="sr-only">Language Selector</label>
                <select id="language-select" class="border rounded-lg px-3 py-1.5 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-accent cursor-pointer transition-colors bg-surface hover:bg-accent/10 border-ink/10">
                    <option value="javascript">JavaScript</option>
                    <option value="typescript">TypeScript</option>
                    <option value="jsx">JSX</option>
                    <option value="tsx">TSX</option>
                    <option value="html">HTML</option>
                    <option value="css">CSS</option>
                    <option value="scss">SCSS</option>
                    <option value="less">LESS</option>
                    <option value="json">JSON</option>
                    <option value="python">Python</option>
                    <option value="markup">Markdown</option>
                    <option value="yaml">YAML</option>
                    <option value="sql">SQL</option>
                    <option value="bash">Bash / Shell</option>
                    <option value="c">C</option>
                    <option value="cpp">C++</option>
                    <option value="java">Java</option>
                    <option value="go">Go</option>
                    <option value="rust">Rust</option>
                    <option value="php">PHP</option>
                    <option value="ruby">Ruby</option>
                    <option value="csharp">C#</option>
                    <option value="xml">XML</option>
                    <option value="plaintext">Plain Text</option>
                </select>
            </div>

            <!-- Run Live Preview Button (Shows when executable HTML/CSS/JS is live) -->
            <button id="btn-run" class="flex items-center gap-1.5 bg-accent hover:bg-accent/90 text-canvas font-semibold text-xs px-3.5 py-1.5 rounded-lg shadow-md shadow-accent/10 transition-all transform hover:-translate-y-0.5 active:translate-y-0">
                <i class="fa-solid fa-play"></i>
                <span class="hidden sm:inline">Run Live</span>
            </button>

            <!-- Export Code -->
            <button id="btn-download" title="Download File" class="w-8.5 h-8.5 rounded-lg flex items-center justify-center transition-colors bg-surface hover:bg-accent/10">
                <i class="fa-solid fa-download text-xs text-ink"></i>
            </button>

            <!-- Settings Trigger -->
            <button id="btn-settings" title="Editor Preferences" class="w-8.5 h-8.5 rounded-lg flex items-center justify-center transition-colors bg-surface hover:bg-accent/10">
                <i class="fa-solid fa-sliders text-xs text-ink"></i>
            </button>

            <!-- Quick Clipboard Copy -->
            <button id="btn-copy" title="Copy Raw Code" class="w-8.5 h-8.5 rounded-lg flex items-center justify-center transition-colors bg-surface hover:bg-accent/10">
                <i class="fa-solid fa-copy text-xs text-ink"></i>
            </button>
        </div>
    </header>

    <!-- App Body (Sidebar + Editor Pane + Preview Split Screen) -->
    <main class="flex-1 flex overflow-hidden relative">

        <!-- Left Sidebar: Project Switcher + File Tree -->
        <aside id="file-sidebar" class="w-64 border-r flex flex-col transition-all duration-300 ease-in-out shrink-0 z-10 border-ink/10 bg-canvas">
            <!-- Project Switcher -->
            <div class="p-2.5 border-b space-y-1.5 border-ink/10 bg-canvas">
                <div class="flex items-center justify-between">
                    <span class="text-xs font-bold uppercase tracking-wider text-muted">Project</span>
                    <button id="btn-toggle-sidebar" class="text-muted hover:text-ink" title="Collapse Explorer">
                        <i class="fa-solid fa-chevron-left text-xs"></i>
                    </button>
                </div>
                <div class="relative">
                    <select id="project-select" class="w-full border rounded-lg pl-3 pr-7 py-1.5 text-xs font-bold focus:outline-none focus:ring-2 focus:ring-accent cursor-pointer appearance-none truncate bg-surface border-ink/10"></select>
                    <i class="fa-solid fa-chevron-down absolute right-2.5 top-1/2 -translate-y-1/2 text-[10px] text-muted pointer-events-none"></i>
                </div>
                <div class="grid grid-cols-3 gap-1.5">
                    <button id="btn-new-project" title="New Project" class="flex items-center justify-center gap-1 py-1.5 rounded-lg text-[10px] font-bold transition-colors bg-surface hover:bg-accent/10 text-ink hover:text-accent">
                        <i class="fa-solid fa-plus text-[10px]"></i> Add
                    </button>
                    <button id="btn-rename-project" title="Rename Project" class="flex items-center justify-center gap-1 py-1.5 rounded-lg text-[10px] font-bold transition-colors bg-surface hover:bg-accent/10 text-ink">
                        <i class="fa-solid fa-pen text-[10px]"></i> Edit
                    </button>
                    <button id="btn-delete-project" title="Delete Project" class="flex items-center justify-center gap-1 py-1.5 rounded-lg text-[10px] font-bold hover:text-accent transition-colors bg-surface hover:bg-accent/10 text-ink">
                        <i class="fa-solid fa-trash text-[10px]"></i> Del
                    </button>
                </div>
            </div>

            <!-- File Tree Toolbar -->
            <div class="px-2.5 pt-2.5 pb-1.5 flex items-center justify-between">
                <span class="text-xs font-bold uppercase tracking-wider text-muted">Explorer</span>
                <div class="flex items-center gap-1">
                    <button id="btn-new-file" title="New File (root)" class="w-6 h-6 rounded flex items-center justify-center transition-colors hover:bg-surface text-muted">
                        <i class="fa-regular fa-file text-xs"></i>
                    </button>
                    <button id="btn-new-folder" title="New Folder (root)" class="w-6 h-6 rounded flex items-center justify-center transition-colors hover:bg-surface text-muted">
                        <i class="fa-regular fa-folder text-xs"></i>
                    </button>
                </div>
            </div>

            <!-- File Tree -->
            <div class="flex-1 overflow-y-auto px-2 pb-2 space-y-0.5" id="file-tree"></div>

            <!-- Import Sandbox Section -->
            <div class="p-3.5 border-t space-y-2 border-ink/10">
                <span class="text-xs font-bold uppercase tracking-wider block text-muted">Import Files</span>
                <div class="relative group">
                    <label for="file-upload" class="flex flex-col items-center justify-center w-full h-20 border-2 border-dashed rounded-lg hover:border-accent transition-colors cursor-pointer border-ink/10 hover:bg-accent/10">
                        <i class="fa-solid fa-cloud-arrow-up text-muted group-hover:text-accent mb-1.5 text-lg"></i>
                        <span class="text-[10px] font-semibold text-muted">Drag or drop standard code</span>
                    </label>
                    <input type="file" id="file-upload" class="hidden" accept=".js,.html,.css,.py,.md,.txt" multiple>
                </div>
            </div>
        </aside>

        <!-- Toggle Button for Collapsed Sidebar -->
        <button id="btn-show-sidebar" class="absolute left-0 top-1/2 transform -translate-y-1/2 bg-accent text-canvas rounded-r-lg py-3 px-1.5 shadow-md z-20 hidden hover:bg-accent transition-colors">
            <i class="fa-solid fa-chevron-right text-xs"></i>
        </button>

        <!-- Main Workspace (Editor Container + Live Preview) -->
        <section class="flex-1 flex flex-col md:flex-row min-w-0 relative">
            
            <!-- CODE EDITOR AREA -->
            <div class="flex-1 flex flex-col min-w-0 transition-theme h-full bg-canvas">
                <div class="flex items-center justify-between px-4 py-2 border-b transition-theme text-xs font-medium bg-canvas border-ink/10">
                    <div class="flex items-center gap-2">
                        <span class="w-2.5 h-2.5 rounded-full bg-accent animate-pulse"></span>
                        <span id="active-filename" class="font-semibold text-ink">algorithms.js</span>
                    </div>
                    <div class="flex items-center gap-3 text-muted">
                        <span id="line-col-counter">Ln 1, Col 1</span>
                        <span id="char-counter">0 chars</span>
                    </div>
                </div>

                <!-- Editor Workspace container -->
                <div class="flex-1 flex overflow-hidden relative">
                    <!-- Line Numbers Column -->
                    <div class="line-num-container w-14 border-r select-none overflow-hidden transition-theme border-ink/10 bg-canvas text-muted" id="line-numbers">
                        <div>1</div>
                    </div>

                    <!-- Input / Display Overlay Grid -->
                    <div class="flex-1 h-full relative editor-container overflow-hidden">
                        <!-- Highlighting container (Matches scrolling) -->
                        <pre id="highlight-pre" class="h-full w-full pointer-events-none transition-theme"><code id="highlight-code" class="language-javascript"></code></pre>
                        
                        <!-- Typing Area (Overlays identical coordinates) -->
                        <textarea id="editing-area" spellcheck="false" class="transition-theme" placeholder="Write code here..."></textarea>
                    </div>
                </div>
            </div>

            <!-- COLLAPSIBLE PREVIEW PANEL / SANDBOX -->
            <div id="preview-panel" class="w-full md:w-[45%] border-t md:border-t-0 md:border-l flex flex-col h-1/2 md:h-full transition-all duration-300 border-ink/10 bg-canvas">
                <div class="h-10 px-4 border-b flex items-center justify-between text-xs font-semibold shrink-0 gap-2 bg-canvas border-ink/10 text-ink">
                    <div class="flex items-center gap-2 min-w-0">
                        <i class="fa-solid fa-laptop-code text-accent"></i>
                        <span class="shrink-0">Live Preview</span>
                        <span id="preview-mode-badge" class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-accent/10 truncate text-accent">project</span>
                    </div>
                    <div class="flex items-center gap-2 shrink-0">
                        <button id="btn-refresh-preview" title="Refresh Live State" class="w-6 h-6 rounded flex items-center justify-center transition-colors hover:bg-surface">
                            <i class="fa-solid fa-arrows-rotate"></i>
                        </button>
                        <button id="btn-toggle-preview" class="w-6 h-6 rounded flex items-center justify-center transition-colors hover:bg-surface" title="Close Preview">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                </div>
                
                <!-- Sandboxed Output iframe -->
                <div class="flex-1 bg-canvas relative">
                    <iframe id="live-iframe" class="w-full h-full border-none" sandbox="allow-scripts allow-modals"></iframe>
                    <div id="iframe-loader" class="absolute inset-0 flex flex-col items-center justify-center gap-2 hidden bg-canvas/95">
                        <div class="w-8 h-8 rounded-full border-2 border-surface border-t-accent animate-spin"></div>
                        <span class="text-xs font-semibold text-muted">Updating live Sandbox...</span>
                    </div>
                </div>

                <!-- Live Virtual Sandbox Terminal Console Output -->
                <div class="h-40 border-t bg-canvas flex flex-col text-[13px] font-mono overflow-hidden border-ink/10">
                    <div class="h-8 px-3 bg-canvas border-b border-ink/10 flex items-center justify-between text-[11px] font-bold tracking-wider text-muted select-none uppercase">
                        <span>Console Output</span>
                        <button id="btn-clear-console" class="hover:text-ink transition-colors">Clear</button>
                    </div>
                    <div id="virtual-console" class="flex-1 p-3 overflow-y-auto space-y-1.5 text-ink select-text selection:bg-accent/20">
                        <div class="text-muted italic">No output received. Press 'Run Live' to launch script console logs...</div>
                    </div>
                </div>
            </div>
            
        </section>
    </main>

    <!-- SETTINGS DRAWER OVERLAY -->
    <div id="settings-drawer" class="fixed inset-0 bg-canvas/40 backdrop-blur-sm z-50 flex justify-end transform translate-x-full transition-transform duration-300">
        <div class="w-80 h-full p-6 shadow-2xl flex flex-col justify-between border-l bg-canvas border-ink/10">
            <div class="space-y-6">
                <div class="flex items-center justify-between pb-4 border-b border-ink/10">
                    <h3 class="font-bold text-md text-ink">Preferences</h3>
                    <button id="btn-close-settings" class="text-muted hover:text-ink">
                        <i class="fa-solid fa-xmark text-lg"></i>
                    </button>
                </div>

                <!-- Editor Setup Elements -->
                <div class="space-y-4">
                    <!-- Font size controls -->
                    <div class="space-y-1.5">
                        <label for="font-size-control" class="text-xs font-bold text-muted uppercase">Editor Font Size</label>
                        <div class="flex items-center gap-2">
                            <input type="range" id="font-size-control" min="12" max="22" step="1" value="14" class="w-full accent-[#C5A059] cursor-pointer">
                            <span id="font-size-display" class="text-xs font-mono font-bold px-2 py-1 rounded bg-surface">14px</span>
                        </div>
                    </div>

                    <!-- Indent Spaces -->
                    <div class="space-y-1.5">
                        <label for="tab-size-control" class="text-xs font-bold text-muted uppercase block">Tab/Indent Size</label>
                        <select id="tab-size-control" class="w-full border rounded-lg px-3 py-2 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-accent cursor-pointer bg-surface border-ink/10">
                            <option value="2">2 Spaces</option>
                            <option value="4" selected>4 Spaces</option>
                            <option value="8">8 Spaces</option>
                        </select>
                    </div>

                    <!-- Auto close toggles -->
                    <div class="flex items-center justify-between py-2 border-t border-b border-ink/10">
                        <span class="text-xs font-semibold text-ink">Auto-close Brackets</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="toggle-autoclose" class="sr-only peer" checked>
                            <span class="w-9 h-5 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-accent after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-ink after:border-accent/30 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-accent bg-accent/10"></span>
                        </label>
                    </div>

                    <!-- Auto save -->
                    <div class="flex items-center justify-between py-2 border-b border-ink/10">
                        <span class="text-xs font-semibold text-ink">Autosave Locally</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="toggle-autosave" class="sr-only peer" checked>
                            <span class="w-9 h-5 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-accent after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-ink after:border-accent/30 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-accent bg-accent/10"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="pt-6 border-t border-ink/10">
                <button id="btn-reset-preferences" class="w-full text-center py-2 rounded-lg text-xs font-bold transition-colors bg-surface hover:bg-accent/10 text-ink">
                    Reset defaults
                </button>
            </div>
        </div>
    </div>

    <!-- CUSTOM FLOATING TOAST CONTAINER (No raw browser alert popups) -->
    <div id="toast-container" class="fixed bottom-6 right-6 space-y-2 z-50 pointer-events-none"></div>

    <!-- Context Menu for File Tree -->
    <div id="context-menu" class="hidden fixed z-[60] border rounded-lg shadow-2xl py-1 min-w-[160px] text-xs font-semibold bg-canvas border-ink/10 text-ink">
        <button data-action="new-file" class="ctx-item w-full text-left px-3 py-2 flex items-center gap-2 hover:bg-surface"><i class="fa-regular fa-file w-3.5"></i> New File</button>
        <button data-action="new-folder" class="ctx-item w-full text-left px-3 py-2 flex items-center gap-2 hover:bg-surface"><i class="fa-regular fa-folder w-3.5"></i> New Folder</button>
        <div class="border-t my-1 border-ink/10"></div>
        <button data-action="rename" class="ctx-item w-full text-left px-3 py-2 flex items-center gap-2 hover:bg-surface"><i class="fa-solid fa-pen w-3.5"></i> Rename</button>
        <button data-action="delete" class="ctx-item w-full text-left px-3 py-2 text-accent flex items-center gap-2 hover:bg-accent/10"><i class="fa-solid fa-trash w-3.5"></i> Delete</button>
    </div>

    <!-- Generic Prompt Modal (for naming files/folders/projects) -->
    <div id="prompt-modal" class="hidden fixed inset-0 bg-canvas/40 backdrop-blur-sm z-[70] flex items-center justify-center p-4">
        <div class="w-full max-w-sm rounded-xl shadow-2xl border p-5 space-y-4 bg-canvas border-ink/10">
            <h3 id="prompt-modal-title" class="font-bold text-sm text-ink">Enter a name</h3>
            <input id="prompt-modal-input" type="text" class="w-full border rounded-lg px-3 py-2 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-accent bg-surface border-ink/10" />
            <div class="flex justify-end gap-2">
                <button id="prompt-modal-cancel" class="px-3.5 py-1.5 rounded-lg text-xs font-bold bg-surface hover:bg-accent/10 text-ink">Cancel</button>
                <button id="prompt-modal-confirm" class="px-3.5 py-1.5 rounded-lg text-xs font-bold bg-accent hover:bg-accent/90 text-canvas">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Confirm Modal (for destructive actions) -->
    <div id="confirm-modal" class="hidden fixed inset-0 bg-canvas/40 backdrop-blur-sm z-[70] flex items-center justify-center p-4">
        <div class="w-full max-w-sm rounded-xl shadow-2xl border p-5 space-y-4 bg-canvas border-ink/10">
            <h3 id="confirm-modal-title" class="font-bold text-sm text-ink">Are you sure?</h3>
            <p id="confirm-modal-body" class="text-xs text-muted"></p>
            <div class="flex justify-end gap-2">

        // ============================== INDEXEDDB LAYER ==============================
        const DB_NAME = 'aura_edit_db';
        const DB_VERSION = 1;
        let db = null;

        function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onupgradeneeded = (e) => {
                    const _db = e.target.result;
                    if (!_db.objectStoreNames.contains('projects')) {
                        _db.createObjectStore('projects', { keyPath: 'id' });
                    }
                    if (!_db.objectStoreNames.contains('trees')) {
                        _db.createObjectStore('trees', { keyPath: 'projectId' });
                    }
                    if (!_db.objectStoreNames.contains('settings')) {
                        _db.createObjectStore('settings', { keyPath: 'key' });
                    }
                };
                req.onsuccess = (e) => { db = e.target.result; resolve(db); };
                req.onerror = (e) => reject(e);
            });
        }

        function idbGet(storeName, key) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readonly');
                const store = tx.objectStore(storeName);
                const req = store.get(key);
                req.onsuccess = () => resolve(req.result);
                req.onerror = (e) => reject(e);
            });
        }

        function idbGetAll(storeName) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readonly');
                const store = tx.objectStore(storeName);
                const req = store.getAll();
                req.onsuccess = () => resolve(req.result);
                req.onerror = (e) => reject(e);
            });
        }

        function idbPut(storeName, value) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                const req = store.put(value);
                req.onsuccess = () => resolve(req.result);
                req.onerror = (e) => reject(e);
            });
        }

        function idbDelete(storeName, key) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                const req = store.delete(key);
                req.onsuccess = () => resolve(req.result);
                req.onerror = (e) => reject(e);
            });
        }

            if (!currentProjectId || !fileTree) return;
            try {
                await idbPut('trees', { projectId: currentProjectId, root: fileTree, openFileId: openFile ? openFile.id : null, expanded: Array.from(expandedFolders) });
            } catch (e) { console.error(e); }
        }

        function debounceSaveTree() {
            if (saveDebounceTimer) clearTimeout(saveDebounceTimer);
            saveDebounceTimer = setTimeout(() => { saveTree(); }, 400);
        }

        // ============================== DEFAULT PROJECT/TREE BUILDERS ==============================
        function makeFile(name, content) {
            return { id: uid(), type: 'file', name, content, lang: langFromFilename(name) };
        }
        function makeFolder(name, children = []) {
            return { id: uid(), type: 'folder', name, children };
        }

        function buildDefaultTree() {
            const root = makeFolder('root', []);
            const indexHtml = makeFile('index.html', TEMPLATE_CODES.html);
            const stylesCss = makeFile('styles.css', TEMPLATE_CODES.css);
            const algoJs = makeFile('algorithms.js', TEMPLATE_CODES.javascript);
            const searchPy = makeFile('binary_search.py', TEMPLATE_CODES.python);
            const readme = makeFile('README.md', TEMPLATE_CODES.markdown);

            const srcFolder = makeFolder('src', [algoJs, stylesCss]);
            root.children.push(indexHtml, srcFolder, searchPy, readme);
            return root;
        }

        function findFirstFile(node) {
            if (!node) return null;
            if (node.type === 'file') return node;
            for (const child of (node.children || [])) {
                const f = findFirstFile(child);
                if (f) return f;
            }
            return null;
        }

        function findNodeById(node, id, parent = null) {
            if (!node) return null;
            if (node.id === id) return { node, parent };
            if (node.type === 'folder') {
                for (const child of node.children) {
                    const found = findNodeById(child, id, node);
                    if (found) return found;
                }
            }
            return null;
        }

        function getNodePath(node, root, trail = []) {
            if (node.id === root.id) return trail.length ? trail.join('/') : node.name;
            function walk(current, path) {
                for (const child of current.children) {
                    const nextPath = [...path, child.name];
                    if (child.id === node.id) return nextPath;
                    if (child.type === 'folder') {
                        const res = walk(child, nextPath);
                        if (res) return res;
                    }
                }
                return null;
            }
            const res = walk(root, []);
            return res ? res.join('/') : node.name;
        }

        function siblingNameExists(folder, name, excludeId = null) {
            return folder.children.some(c => c.name.toLowerCase() === name.toLowerCase() && c.id !== excludeId);
        }

        // ============================== PROJECT MANAGEMENT ==============================
        async function initProjects() {
            let storedProjects = [];
            try { storedProjects = await idbGetAll('projects'); } catch (e) { storedProjects = []; }

            if (!storedProjects || storedProjects.length === 0) {
                const defaultProject = { id: uid(), name: 'My First Project', createdAt: Date.now() };
                projects = [defaultProject];
                const root = buildDefaultTree();
                await idbPut('projects', defaultProject);
                await idbPut('trees', { projectId: defaultProject.id, root, openFileId: null, expanded: ['root'] });
            } else {
                projects = storedProjects.sort((a, b) => a.createdAt - b.createdAt);
            }

            const savedCurrent = await loadSetting('current_project_id', null);
            currentProjectId = (savedCurrent && projects.some(p => p.id === savedCurrent)) ? savedCurrent : projects[0].id;

            renderProjectSelect();
            await loadProject(currentProjectId);
        }

        function renderProjectSelect() {
            projectSelect.innerHTML = '';
            projects.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = p.name;
                if (p.id === currentProjectId) opt.selected = true;
                projectSelect.appendChild(opt);
            });
        }

        async function loadProject(projectId) {
            currentProjectId = projectId;
            let treeRecord = null;
            try { treeRecord = await idbGet('trees', projectId); } catch (e) { treeRecord = null; }

            if (!treeRecord) {
                fileTree = buildDefaultTree();
                expandedFolders = new Set(['root']);
                openFile = findFirstFile(fileTree);
                await idbPut('trees', { projectId, root: fileTree, openFileId: openFile ? openFile.id : null, expanded: Array.from(expandedFolders) });
            } else {
                fileTree = treeRecord.root;
                expandedFolders = new Set(treeRecord.expanded || ['root']);
                expandedFolders.add('root');
                if (treeRecord.openFileId) {
                    const found = findNodeById(fileTree, treeRecord.openFileId);
                    openFile = found ? found.node : findFirstFile(fileTree);
                } else {
                    openFile = findFirstFile(fileTree);
                }
            }

            await saveProjects();
            renderFileTree();
            openFileInEditor(openFile);
        }

        function promptDialog(title, defaultValue = '') {
            return new Promise((resolve) => {
                promptModalTitle.textContent = title;
                promptModalInput.value = defaultValue;
                promptModal.classList.remove('hidden');
                setTimeout(() => { promptModalInput.focus(); promptModalInput.select(); }, 50);

                function cleanup(result) {
                    promptModal.classList.add('hidden');
                    promptModalConfirm.removeEventListener('click', onConfirm);
                    promptModalCancel.removeEventListener('click', onCancel);
                    promptModalInput.removeEventListener('keydown', onKey);
                    resolve(result);
                }
                function onConfirm() { cleanup(promptModalInput.value.trim()); }
                function onCancel() { cleanup(null); }
                function onKey(e) {
                    if (e.key === 'Enter') { e.preventDefault(); onConfirm(); }
                    if (e.key === 'Escape') { e.preventDefault(); onCancel(); }
                }
                promptModalConfirm.addEventListener('click', onConfirm);
                promptModalCancel.addEventListener('click', onCancel);
                promptModalInput.addEventListener('keydown', onKey);
            });
        }

        function confirmDialog(title, body) {
            return new Promise((resolve) => {
                confirmModalTitle.textContent = title;
                confirmModalBody.textContent = body;
                confirmModal.classList.remove('hidden');

                function cleanup(result) {
                    confirmModal.classList.add('hidden');
                    confirmModalConfirm.removeEventListener('click', onConfirm);
                    confirmModalCancel.removeEventListener('click', onCancel);
                    resolve(result);
                }
                function onConfirm() { cleanup(true); }
                function onCancel() { cleanup(false); }
                confirmModalConfirm.addEventListener('click', onConfirm);
                confirmModalCancel.addEventListener('click', onCancel);
            });
        }

        btnNewProject.addEventListener('click', async () => {
            const name = await promptDialog('New Project Name');
            if (!name) return;
            const newProject = { id: uid(), name, createdAt: Date.now() };
            projects.push(newProject);
            const root = makeFolder('root', [makeFile('index.html', TEMPLATE_CODES.html)]);
            await idbPut('projects', newProject);
            await idbPut('trees', { projectId: newProject.id, root, openFileId: null, expanded: ['root'] });
            renderProjectSelect();
            projectSelect.value = newProject.id;
            await loadProject(newProject.id);
            triggerToast(`Project "${name}" created`, 'success');
        });

        btnRenameProject.addEventListener('click', async () => {
            const project = projects.find(p => p.id === currentProjectId);
            if (!project) return;
            const name = await promptDialog('Rename Project', project.name);
            if (!name) return;
            project.name = name;
            await idbPut('projects', project);
            renderProjectSelect();
            triggerToast('Project renamed', 'success');
        });

        btnDeleteProject.addEventListener('click', async () => {
            if (projects.length <= 1) {
                triggerToast('Cannot delete the only project', 'info');
                return;
            }
            const project = projects.find(p => p.id === currentProjectId);
            const ok = await confirmDialog('Delete Project', `Delete "${project.name}" and all its files? This cannot be undone.`);
            if (!ok) return;

            await idbDelete('projects', project.id);
            await idbDelete('trees', project.id);
            projects = projects.filter(p => p.id !== project.id);
            currentProjectId = projects[0].id;
            renderProjectSelect();
            await loadProject(currentProjectId);
            triggerToast('Project deleted', 'success');
        });

        projectSelect.addEventListener('change', async (e) => {
            await loadProject(e.target.value);
            triggerToast('Project switched', 'info');
        });

        // ============================== FILE TREE RENDERING ==============================
        function renderFileTree() {
            fileTreeEl.innerHTML = '';
            renderFolderChildren(fileTree, fileTreeEl, 0);
        }

        function renderFolderChildren(folderNode, container, depth) {
            const sorted = [...folderNode.children].sort((a, b) => {
                if (a.type !== b.type) return a.type === 'folder' ? -1 : 1;
                return a.name.localeCompare(b.name);
            });

            sorted.forEach(node => {
                if (node.type === 'folder') {
                    const isExpanded = expandedFolders.has(node.id);
                    const row = document.createElement('div');
                    row.className = 'tree-row group flex items-center gap-1.5 px-1.5 py-1 rounded-md cursor-pointer text-xs font-semibold hover:bg-accent/10 text-ink';
                    row.style.paddingLeft = `${6 + depth * 14}px`;
                    row.dataset.nodeId = node.id;
                    row.innerHTML = `
                        <i class="fa-solid fa-chevron-${isExpanded ? 'down' : 'right'} text-[9px] w-2.5 text-muted"></i>
                        <i class="fa-solid fa-folder${isExpanded ? '-open' : ''} text-accent text-xs w-4 text-center"></i>
                        <span class="flex-1 truncate">${escapeHTML(node.name)}</span>
                    `;
                    row.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (expandedFolders.has(node.id)) {
                            expandedFolders.delete(node.id);
                        } else {
                            expandedFolders.add(node.id);
                        }
                        renderFileTree();
                        debounceSaveTree();
                    });
                    row.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        openContextMenu(e, node.id, false);
                    });
                    container.appendChild(row);

                    if (isExpanded) {
                        renderFolderChildren(node, container, depth + 1);
                    }
                } else {
                    const isActive = openFile && openFile.id === node.id;
                    const iconInfo = FILE_ICONS[node.lang] || FILE_ICONS.plaintext;
                    const row = document.createElement('div');
                    row.className = `tree-row group flex items-center gap-1.5 px-1.5 py-1 rounded-md cursor-pointer text-xs font-medium transition-colors ${isActive ? 'bg-accent/10 text-accent' : 'hover:bg-accent/10 text-ink'}`;
                    row.style.paddingLeft = `${6 + depth * 14 + 14}px`;
                    row.dataset.nodeId = node.id;

                    const iconHTML = iconInfo.fa
                        ? `<i class="${iconInfo.icon} text-[10px]"></i>`
                        : `<span class="text-[8px] font-black">${iconInfo.icon}</span>`;

                    row.innerHTML = `
                        <div class="w-4 h-4 rounded ${iconInfo.cls} flex items-center justify-center shrink-0">${iconHTML}</div>
                        <span class="flex-1 truncate">${escapeHTML(node.name)}</span>
                    `;
                    row.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openFileInEditor(node);
                    });
                    row.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        openContextMenu(e, node.id, false);
                    });
                    container.appendChild(row);
                }
            });
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Right-click on empty tree area = root context menu
        fileTreeEl.addEventListener('contextmenu', (e) => {
            if (e.target === fileTreeEl) {
                e.preventDefault();
                openContextMenu(e, 'root', true);
            }
        });

        function openContextMenu(e, nodeId, isRoot) {
            ctxTargetNodeId = nodeId;
            ctxTargetProjectRoot = isRoot;

            // Show/hide rename & delete based on root
            const renameBtn = contextMenu.querySelector('[data-action="rename"]');
            const deleteBtn = contextMenu.querySelector('[data-action="delete"]');
            if (isRoot || nodeId === 'root') {
                renameBtn.classList.add('hidden');
                deleteBtn.classList.add('hidden');
            } else {
                renameBtn.classList.remove('hidden');
                deleteBtn.classList.remove('hidden');
            }

            // If target is a file (not folder), hide "new file/folder inside"
            const targetInfo = findNodeById(fileTree, nodeId);
            const newFileBtn = contextMenu.querySelector('[data-action="new-file"]');
            const newFolderBtn = contextMenu.querySelector('[data-action="new-folder"]');
            if (targetInfo && targetInfo.node.type === 'file') {
                newFileBtn.classList.add('hidden');
                newFolderBtn.classList.add('hidden');
            } else {
                newFileBtn.classList.remove('hidden');
                newFolderBtn.classList.remove('hidden');
            }

            contextMenu.classList.remove('hidden');
            const x = e.clientX, y = e.clientY;
            contextMenu.style.left = `${x}px`;
            contextMenu.style.top = `${y}px`;

            // keep on-screen
            requestAnimationFrame(() => {
                const rect = contextMenu.getBoundingClientRect();
                if (rect.right > window.innerWidth) contextMenu.style.left = `${window.innerWidth - rect.width - 8}px`;
                if (rect.bottom > window.innerHeight) contextMenu.style.top = `${window.innerHeight - rect.height - 8}px`;
            });
        }

        function closeContextMenu() {
            contextMenu.classList.add('hidden');
        }

        document.addEventListener('click', closeContextMenu);
        window.addEventListener('blur', closeContextMenu);
        document.addEventListener('scroll', closeContextMenu, true);

        contextMenu.addEventListener('click', async (e) => {
            const btn = e.target.closest('.ctx-item');
            if (!btn) return;
            const action = btn.dataset.action;
            const nodeId = ctxTargetNodeId;
            closeContextMenu();

            let targetFolder = fileTree;
            let targetNode = null;
            if (nodeId !== 'root') {
                const found = findNodeById(fileTree, nodeId);
                if (found) {
                    targetNode = found.node;
                    targetFolder = found.node.type === 'folder' ? found.node : found.parent;
                }
            }

            if (action === 'new-file') {
                await createNewFile(targetFolder);
            } else if (action === 'new-folder') {
                await createNewFolder(targetFolder);
            } else if (action === 'rename') {
                await renameNode(targetNode);
            } else if (action === 'delete') {
                await deleteNode(targetNode);
            }
        });

        async function createNewFile(parentFolder) {
            const name = await promptDialog('New File Name (e.g. script.js)');
            if (!name) return;
            if (siblingNameExists(parentFolder, name)) {
                triggerToast('A file or folder with that name already exists', 'info');
                return;
            }
            const file = makeFile(name, TEMPLATE_CODES[langFromFilename(name)] || '');
            parentFolder.children.push(file);
            if (parentFolder.id !== 'root') expandedFolders.add(parentFolder.id);
            renderFileTree();
            await saveTree();
            openFileInEditor(file);
            triggerToast(`Created ${name}`, 'success');
        }

        async function createNewFolder(parentFolder) {
            const name = await promptDialog('New Folder Name');
            if (!name) return;
            if (siblingNameExists(parentFolder, name)) {
                triggerToast('A file or folder with that name already exists', 'info');
                return;
            }
            const folder = makeFolder(name, []);
            parentFolder.children.push(folder);
            expandedFolders.add(folder.id);
            if (parentFolder.id !== 'root') expandedFolders.add(parentFolder.id);
            renderFileTree();
            await saveTree();
            triggerToast(`Created folder ${name}`, 'success');
        }

        async function renameNode(node) {
            if (!node) return;
            const found = findNodeById(fileTree, node.id);
            const parent = found ? found.parent : fileTree;
            const name = await promptDialog(`Rename ${node.type}`, node.name);
            if (!name || name === node.name) return;
            if (siblingNameExists(parent, name, node.id)) {
                triggerToast('A file or folder with that name already exists', 'info');
                return;
            }
            node.name = name;
            if (node.type === 'file') {
                node.lang = langFromFilename(name);
            }
            renderFileTree();
            await saveTree();
            if (openFile && openFile.id === node.id) {
                openFileInEditor(node);
            }
            triggerToast('Renamed successfully', 'success');
        }

        async function deleteNode(node) {
            if (!node) return;
            const found = findNodeById(fileTree, node.id);
            if (!found) return;
            const parent = found.parent;

            const itemType = node.type === 'folder' ? 'folder and all its contents' : 'file';
            const ok = await confirmDialog('Delete', `Delete "${node.name}" ${itemType === 'file' ? '' : '(and all its contents)'}? This cannot be undone.`);
            if (!ok) return;

            parent.children = parent.children.filter(c => c.id !== node.id);

            // If the open file was deleted (or inside deleted folder), open another file
            const stillExists = openFile ? findNodeById(fileTree, openFile.id) : null;
            if (!stillExists) {
                openFile = findFirstFile(fileTree);
            }

            renderFileTree();
            await saveTree();
            openFileInEditor(openFile);
            triggerToast('Deleted successfully', 'success');
        }

        // Root-level new file/folder buttons
        btnNewFile.addEventListener('click', () => createNewFile(fileTree));
        btnNewFolder.addEventListener('click', () => createNewFolder(fileTree));

        // ============================== EDITOR <-> FILE SYNC ==============================
        function openFileInEditor(node) {
            if (!node) {
                // No files at all - create a default one
                const file = makeFile('untitled.txt', '');
                fileTree.children.push(file);
                node = file;
                renderFileTree();
                saveTree();
            }
            openFile = node;

            highlightCode.className = '';
            highlightCode.classList.add(PRISM_LANG_MAP[node.lang] || 'language-none');
            languageSelect.value = node.lang;

            editingArea.value = node.content || '';
            const path = getNodePath(node, fileTree);
            activeFilename.textContent = path;

            handleEditingSyntax(false);
            renderFileTree();
            runLiveSandbox();
            saveTree();
        }

        // Language select now changes the *current file's* language (re-highlight only)
        languageSelect.addEventListener('change', (e) => {
            if (!openFile) return;
            openFile.lang = e.target.value;
            highlightCode.className = '';
            highlightCode.classList.add(PRISM_LANG_MAP[openFile.lang] || 'language-none');
            handleEditingSyntax(true);
            runLiveSandbox();
            triggerToast(`File language set to ${openFile.lang.toUpperCase()}`, 'info');
        });

        // ============================== EDITOR CORE ==============================
        function updateEditorProperties() {
            editingArea.style.fontSize = `${editorFontSize}px`;
            highlightPre.style.fontSize = `${editorFontSize}px`;
            highlightCode.style.fontSize = `${editorFontSize}px`;
            lineNumbers.style.fontSize = `${editorFontSize}px`;

            const computedLineHeight = 24;
            editingArea.style.lineHeight = `${computedLineHeight}px`;
            highlightCode.style.lineHeight = `${computedLineHeight}px`;
            lineNumbers.style.lineHeight = `${computedLineHeight}px`;

            editingArea.style.tabSize = tabSpaces;
            highlightCode.style.tabSize = tabSpaces;
            editingArea.style.mozTabSize = tabSpaces;
            highlightCode.style.mozTabSize = tabSpaces;
        }

        function handleEditingSyntax(persist = true) {
            let code = editingArea.value;

            if (code[code.length - 1] === '\n') {
                code += ' ';
            }

            highlightCode.textContent = code;
            Prism.highlightElement(highlightCode);

            updateLineCounter();
            updateLiveStatusInfo();

            if (openFile) {
                openFile.content = editingArea.value;
                if (autosaveEnabled && persist) {
                    debounceSaveTree();
                }
            }
        }

        function updateLineCounter() {
            const lines = editingArea.value.split('\n');
            const lineCount = lines.length;

            let numHTML = '';
            for (let i = 1; i <= lineCount; i++) {
                numHTML += `<div>${i}</div>`;
            }
            lineNumbers.innerHTML = numHTML;
        }

        function setupSynchronizedScrolling() {
            editingArea.addEventListener('scroll', () => {
                highlightPre.scrollTop = editingArea.scrollTop;
                highlightPre.scrollLeft = editingArea.scrollLeft;
                lineNumbers.scrollTop = editingArea.scrollTop;
            });
        }

        function updateLiveStatusInfo() {
            const value = editingArea.value;
            charCounter.textContent = `${value.length} char${value.length !== 1 ? 's' : ''}`;

            const selectionStart = editingArea.selectionStart;
            const textToCursor = value.substring(0, selectionStart);
            const lines = textToCursor.split('\n');
            const currentLine = lines.length;
            const currentCol = lines[lines.length - 1].length + 1;

            lineColCounter.textContent = `Ln ${currentLine}, Col ${currentCol}`;
        }

        function setupKeyboardHandlers() {
            editingArea.addEventListener('keydown', (e) => {
                const selStart = editingArea.selectionStart;
                const selEnd = editingArea.selectionEnd;
                const value = editingArea.value;

                if (e.key === 'Tab') {
                    e.preventDefault();
                    const tabValue = ' '.repeat(tabSpaces);

                    editingArea.value = value.substring(0, selStart) + tabValue + value.substring(selEnd);
                    editingArea.selectionStart = editingArea.selectionEnd = selStart + tabSpaces;
                    handleEditingSyntax();
                }

                if (e.key === 'Enter') {
                    e.preventDefault();

                    const lastNewLineIndex = value.lastIndexOf('\n', selStart - 1);
                    const currentLineStr = value.substring(lastNewLineIndex + 1, selStart);
                    const matchWhitespace = currentLineStr.match(/^\s*/);
                    let indent = matchWhitespace ? matchWhitespace[0] : '';

                    const lastChar = currentLineStr.trim().slice(-1);
                    let bonusIndent = '';
                    if (['{', '[', '(', ':'].includes(lastChar)) {
                        bonusIndent = ' '.repeat(tabSpaces);
                    }

                    const currentIndentLine = indent + bonusIndent;
                    const closingHandle = ['{', '[', '('].includes(lastChar) && autocloseEnabled;

                    let insertStr = '\n' + currentIndentLine;
                    let cursorShift = insertStr.length;

                    if (closingHandle) {
                        const braceMap = { '{': '}', '[': ']', '(': ')' };
                        const closeBrace = braceMap[lastChar] || '';

                        const nextChar = value.charAt(selStart);
                        if (nextChar === closeBrace) {
                            // Already closed, just format indent
                        } else {
                            insertStr += '\n' + indent + closeBrace;
                        }
                    }

                    editingArea.value = value.substring(0, selStart) + insertStr + value.substring(selEnd);
                    editingArea.selectionStart = editingArea.selectionEnd = selStart + cursorShift;
                    handleEditingSyntax();
                }

                if (autocloseEnabled) {
                    const keysToClose = {
                        '{': '}',
                        '[': ']',
                        '(': ')',
                        '"': '"',
                        "'": "'",
                        '`': '`'
                    };

                    if (keysToClose[e.key] !== undefined) {
                        e.preventDefault();
                        const closingChar = keysToClose[e.key];

                        const selectionText = value.substring(selStart, selEnd);
                        const replacement = e.key + selectionText + closingChar;

                        editingArea.value = value.substring(0, selStart) + replacement + value.substring(selEnd);

                        if (selStart !== selEnd) {
                            editingArea.selectionStart = selStart + 1;
                            editingArea.selectionEnd = selEnd + 1;
                        } else {
                            editingArea.selectionStart = editingArea.selectionEnd = selStart + 1;
                        }
                        handleEditingSyntax();
                    }
                }
            });

            editingArea.addEventListener('input', handleEditingSyntax);
            editingArea.addEventListener('keyup', updateLiveStatusInfo);
            editingArea.addEventListener('click', updateLiveStatusInfo);
        }

        // ============================== LIVE SANDBOX (MULTI-FILE / MULTI-LANGUAGE / MAX LEVEL) ==============================

        const CONSOLE_CATCH_SCRIPT = `
            <script>
                (function() {
                    const originalLog = console.log;
                    const originalError = console.error;
                    const originalWarn = console.warn;
                    const originalInfo = console.info;

                    function fmt(arg) {
                        if (arg instanceof Error) return arg.stack || (arg.name + ': ' + arg.message);
                        if (typeof arg === 'object' && arg !== null) {
                            try { return JSON.stringify(arg, null, 2); } catch(e) { return String(arg); }
                        }
                        return String(arg);
                    }

                    function postLogToParent(type, args) {
                        window.parent.postMessage({
                            type: 'IFRAME_CONSOLE',
                            logType: type,
                            message: Array.from(args).map(fmt).join(' ')
                        }, '*');
                    }

                    console.log = function(...args) { postLogToParent('log', args); originalLog.apply(console, args); };
                    console.error = function(...args) { postLogToParent('error', args); originalError.apply(console, args); };
                    console.warn = function(...args) { postLogToParent('warn', args); originalWarn.apply(console, args); };
                    console.info = function(...args) { postLogToParent('log', args); originalInfo.apply(console, args); };

                    window.addEventListener('error', function(e) {
                        postLogToParent('error', [(e.message || 'Script error') + ' (' + (e.filename ? e.filename.split('/').pop() : 'inline') + ':' + e.lineno + ')']);
                    });
                    window.addEventListener('unhandledrejection', function(e) {
                        postLogToParent('error', ['Unhandled Promise Rejection: ' + (e.reason && e.reason.message ? e.reason.message : e.reason)]);
                    });
                })();
            <\/script>
        `;

        // ---- File tree helpers ----
        function flattenTree(node, prefix, map) {
            for (const child of node.children) {
                const path = prefix ? `${prefix}/${child.name}` : child.name;
                if (child.type === 'file') {
                    map[path] = child;
                } else {
                    flattenTree(child, path, map);
                }
            }
            return map;
        }

        function getAllFilesMap() {
            return flattenTree(fileTree, '', {});
        }

        function resolvePath(basePath, relPath) {
            if (/^(https?:|data:|\/\/|#)/.test(relPath)) return null;
            const baseParts = basePath.split('/').slice(0, -1);
            const relParts = relPath.split('/');
            const stack = [...baseParts];
            for (const part of relParts) {
                if (part === '' || part === '.') continue;
                if (part === '..') stack.pop();
                else stack.push(part);
            }
            return stack.join('/');
        }

        const MIME_BY_EXT = {
            css: 'text/css', js: 'text/javascript', mjs: 'text/javascript', json: 'application/json',
            png: 'image/png', jpg: 'image/jpeg', jpeg: 'image/jpeg', gif: 'image/gif', svg: 'image/svg+xml',
            webp: 'image/webp', ico: 'image/x-icon', html: 'text/html', htm: 'text/html',
            txt: 'text/plain', md: 'text/markdown', woff: 'font/woff', woff2: 'font/woff2'
        };

        function mimeFor(name) {
            const ext = (name.split('.').pop() || '').toLowerCase();
            return MIME_BY_EXT[ext] || 'text/plain';
        }

        function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

        // ============================== SCSS / LESS PREPROCESSOR (best-effort, no deps) ==============================
        // Flattens nested selectors (incl. `&`), resolves @media/@supports wrappers, passes through
        // @keyframes/@font-face verbatim.
        function processCSSBlock(content, parentSelectors) {
            let decls = '';
            let rules = [];
            let i = 0, buf = '';
            const n = content.length;

            while (i < n) {
                const ch = content[i];
                if (ch === '{') {
                    const lastSemi = buf.lastIndexOf(';');
                    decls += buf.substring(0, lastSemi + 1);
                    const selectorRaw = buf.substring(lastSemi + 1).trim();
                    buf = '';

                    let depth = 1, j = i + 1;
                    while (j < n && depth > 0) {
                        if (content[j] === '{') depth++;
                        else if (content[j] === '}') depth--;
                        j++;
                    }
                    const inner = content.substring(i + 1, j - 1);

                    if (selectorRaw.startsWith('@')) {
                        const atName = (selectorRaw.match(/^@[\w-]+/) || ['@'])[0];
                        if (['@keyframes', '@-webkit-keyframes', '@-moz-keyframes', '@font-face', '@page'].includes(atName)) {
                            rules.push(selectorRaw + ' {\n' + inner.trim() + '\n}');
                        } else {
                            const sub = processCSSBlock(inner, parentSelectors);
                            let body = '';
                            if (sub.decls.trim()) {
                                const sel = parentSelectors.filter(s => s).join(',\n') || ':root';
                                body += sel + ' {\n' + sub.decls.trim() + '\n}\n\n';
                            }
                            body += sub.rules.join('\n\n');
                            if (body.trim()) rules.push(selectorRaw + ' {\n' + body.trim() + '\n}');
                        }
                    } else {
                        const childSelectors = selectorRaw.split(',').map(s => s.trim()).filter(Boolean);
                        let combined;
                        if (parentSelectors.length === 1 && parentSelectors[0] === '') {
                            combined = childSelectors;
                        } else if (childSelectors.length === 0) {
                            combined = parentSelectors;
                        } else {
                            combined = [];
                            for (const p of parentSelectors) {
                                for (const c of childSelectors) {
                                    combined.push(c.includes('&') ? c.replace(/&/g, p) : (p ? p + ' ' + c : c));
                                }
                            }
                        }
                        const sub = processCSSBlock(inner, combined);
                        if (sub.decls.trim()) {
                            rules.push(combined.join(',\n') + ' {\n' + sub.decls.trim() + '\n}');
                        }
                        rules.push(...sub.rules);
                    }
                    i = j;
                    continue;
                }
                buf += ch;
                i++;
            }
            decls += buf;
            return { decls, rules };
        }

        function flattenNestedCSS(css) {
            const result = processCSSBlock(css, ['']);
            let out = result.rules.join('\n\n');
            if (result.decls.trim()) {
                out = result.decls.trim() + '\n\n' + out;
            }
            return out;
        }

        function stripAtRuleBlocks(css, names) {
            let i = 0;
            let out = '';
            while (i < css.length) {
                let matched = false;
                for (const name of names) {
                    if (css.startsWith(name, i)) {
                        let k = i + name.length;
                        while (k < css.length && css[k] !== '{' && css[k] !== ';') k++;
                        if (css[k] === '{') {
                            let depth = 1, j = k + 1;
                            while (j < css.length && depth > 0) {
                                if (css[j] === '{') depth++;
                                else if (css[j] === '}') depth--;
                                j++;
                            }
                            i = j;
                        } else {
                            i = k + 1;
                        }
                        matched = true;
                        break;
                    }
                }
                if (!matched) {
                    out += css[i];
                    i++;
                }
            }
            return out;
        }

        function preprocessSCSS(code) {
            let css = code;
            const vars = {};
            css = css.replace(/\$([\w-]+)\s*:\s*([^;]+);/g, (m, name, val) => {
                vars[name] = val.trim();
                return '';
            });
            css = stripAtRuleBlocks(css, ['@mixin', '@function', '@each', '@for', '@while', '@if', '@else if', '@else']);
            css = css.replace(/@(include|extend|use|forward|import)\s+[^;]*;/g, '');
            const names = Object.keys(vars).sort((a, b) => b.length - a.length);
            for (const name of names) {
                css = css.replace(new RegExp('\\$' + escapeRegex(name) + '(?![\\w-])', 'g'), vars[name]);
            }
            return flattenNestedCSS(css);
        }

        function preprocessLESS(code) {
            let css = code;
            const vars = {};
            css = css.replace(/@([\w-]+)\s*:\s*([^;]+);/g, (m, name, val) => {
                vars[name] = val.trim();
                return '';
            });
            const names = Object.keys(vars).sort((a, b) => b.length - a.length);
            for (const name of names) {
                css = css.replace(new RegExp('@' + escapeRegex(name) + '(?![\\w-])', 'g'), vars[name]);
            }
            return flattenNestedCSS(css);
        }

        // Convert any css-family source into plain CSS based on its language
        function toPlainCSS(content, lang) {
            if (lang === 'scss') return preprocessSCSS(content);
            if (lang === 'less') return preprocessLESS(content);
            return content;
        }

        // ============================== JS / TS / JSX / TSX TRANSPILATION (Babel standalone) ==============================
        function transpileScript(code, lang) {
            if (lang === 'javascript') return { code, error: null };
            if (!window.Babel) return { code, error: 'Babel not loaded — cannot transpile ' + lang };
            try {
                const presets = [];
                if (lang === 'typescript') presets.push(['typescript', { onlyRemoveTypeImports: true }]);
                if (lang === 'tsx') presets.push(['typescript', { isTSX: true, allExtensions: true }]);
                if (lang === 'jsx' || lang === 'tsx') presets.push('react');

                const filename = lang === 'tsx' ? 'file.tsx' : (lang === 'jsx' ? 'file.jsx' : (lang === 'typescript' ? 'file.ts' : 'file.js'));
                const result = Babel.transform(code, {
                    presets,
                    filename,
                    sourceType: 'module',
                    retainLines: true
                });
                return { code: result.code, error: null };
            } catch (err) {
                return { code: '', error: err.message || String(err) };
            }
        }

        const SCRIPT_LANGS = ['javascript', 'typescript', 'jsx', 'tsx'];
        const CSS_LANGS = ['css', 'scss', 'less'];

        // ============================== ASSET INLINING (multi-file project resolution) ==============================
        function inlineProjectAssets(source, basePath, filesMap, lang, visited = new Set()) {
            if (visited.has(basePath)) return source;
            visited = new Set(visited);
            visited.add(basePath);

            if (lang === 'html') {
                // <link rel="stylesheet" href="..."> (handles css/scss/less, both attribute orders)
                const linkRegex = /<link\b[^>]*>/gi;
                source = source.replace(linkRegex, (tag) => {
                    if (!/rel=["']?stylesheet["']?/i.test(tag)) return tag;
                    const hrefMatch = tag.match(/href=["']([^"']+)["']/i);
                    if (!hrefMatch) return tag;
                    const resolved = resolvePath(basePath, hrefMatch[1]);
                    if (resolved && filesMap[resolved] && filesMap[resolved].type === 'file') {
                        const f = filesMap[resolved];
                        let cssContent = toPlainCSS(f.content || '', f.lang);
                        cssContent = inlineProjectAssets(cssContent, resolved, filesMap, 'css', visited);
                        return `<style data-src="${escapeHTML(resolved)}">\n${cssContent}\n</style>`;
                    }
                    return tag;
                });

                // <script src="..."> (handles js/ts/jsx/tsx)
                source = source.replace(/<script\b([^>]*)\ssrc=["']([^"']+)["']([^>]*)>\s*<\/script>/gi, (m, pre, src, post) => {
                    const resolved = resolvePath(basePath, src);
                    if (resolved && filesMap[resolved] && filesMap[resolved].type === 'file') {
                        const f = filesMap[resolved];
                        let jsContent = f.content || '';
                        if (SCRIPT_LANGS.includes(f.lang) && f.lang !== 'javascript') {
                            const t = transpileScript(jsContent, f.lang);
                            jsContent = t.error
                                ? `console.error(${JSON.stringify('Transpile error in ' + resolved + ': ' + t.error)});`
                                : t.code;
                        }
                        const attrs = (pre + post).replace(/\btype=["']module["']/i, '').trim();
                        return `<script ${attrs} data-src="${escapeHTML(resolved)}">\n${jsContent}\n<\/script>`;
                    }
                    return m;
                });

                // <img>/<source>/<audio>/<video> src -> data URI for text-based assets (svg etc.)
                source = source.replace(/(<(?:img|source|audio|video)\b[^>]*\bsrc=)["']([^"']+)["']/gi, (m, prefixAttr, src) => {
                    const resolved = resolvePath(basePath, src);
                    if (resolved && filesMap[resolved] && filesMap[resolved].type === 'file') {
                        const f = filesMap[resolved];
                        const mime = mimeFor(f.name);
                        if (mime.startsWith('image/svg') || mime.startsWith('text/')) {
                            const dataUri = `data:${mime};utf8,${encodeURIComponent(f.content || '')}`;
                            return `${prefixAttr}"${dataUri}"`;
                        }
                    }
                    return m;
                });
            } else if (lang === 'css') {
                source = source.replace(/@import\s+(?:url\()?["']?([^"')]+)["']?\)?;/gi, (m, href) => {
                    const resolved = resolvePath(basePath, href);
                    if (resolved && filesMap[resolved] && filesMap[resolved].type === 'file') {
                        const f = filesMap[resolved];
                        const plain = toPlainCSS(f.content || '', f.lang);
                        return inlineProjectAssets(plain, resolved, filesMap, 'css', visited);
                    }
                    return m;
                });
                source = source.replace(/url\(\s*["']?([^"')]+)["']?\s*\)/gi, (m, href) => {
                    if (/^(https?:|data:|#)/.test(href)) return m;
                    const resolved = resolvePath(basePath, href);
                    if (resolved && filesMap[resolved] && filesMap[resolved].type === 'file') {
                        const f = filesMap[resolved];
                        const mime = mimeFor(f.name);
                        if (mime.startsWith('image/svg') || mime.startsWith('font/') || mime.startsWith('text/')) {
                            const dataUri = `data:${mime};utf8,${encodeURIComponent(f.content || '')}`;
                            return `url("${dataUri}")`;
                        }
                    }
                    return m;
                });
            }

            return source;
        }

        function findEntryHtmlFile(filesMap) {
            const preferredNames = ['index.html', 'index.htm', 'main.html', 'home.html'];
            for (const name of preferredNames) {
                if (filesMap[name]) return filesMap[name];
            }
            for (const [path, f] of Object.entries(filesMap)) {
                if (f.type === 'file' && f.lang === 'html' && !path.includes('/')) return f;
            }
            for (const [path, f] of Object.entries(filesMap)) {
                if (f.type === 'file' && f.lang === 'html') return f;
            }
            return null;
        }

        function getOpenFilePath() {
            if (!openFile) return '';
            return getNodePath(openFile, fileTree);
        }

        function injectIntoHead(html, injection) {
            const idx = html.toLowerCase().indexOf('<head>');
            if (idx !== -1) return html.substring(0, idx + 6) + injection + html.substring(idx + 6);
            return injection + html;
        }

        function injectBeforeBodyEnd(html, injection) {
            if (html.toLowerCase().includes('</body>')) {
                return html.replace(/<\/body>/i, `${injection}\n</body>`);
            }
            return html + injection;
        }

        // ============================== MAIN SANDBOX RUNNER ==============================
        function runLiveSandbox() {
            if (!openFile) return;
            iframeLoader.classList.remove('hidden');
            virtualConsole.innerHTML = '';

            setTimeout(() => {
                const activeLanguage = openFile.lang;
                const editorValue = editingArea.value;
                const filesMap = getAllFilesMap();
                const openPath = getOpenFilePath();
                let compiledSource = '';
                let badge = activeLanguage;

                if (activeLanguage === 'html') {
                    badge = 'html · project preview';
                    let resolved = inlineProjectAssets(editorValue, openPath, filesMap, 'html');
                    resolved = injectIntoHead(resolved, CONSOLE_CATCH_SCRIPT);
                    compiledSource = resolved;

                } else if (CSS_LANGS.includes(activeLanguage)) {
                    badge = activeLanguage === 'css' ? 'css · live preview' : `${activeLanguage} · preprocessed preview`;
                    const entryHtml = findEntryHtmlFile(filesMap);
                    let inlinedCss = toPlainCSS(editorValue, activeLanguage);
                    inlinedCss = inlineProjectAssets(inlinedCss, openPath, filesMap, 'css');

                    if (entryHtml) {
                        let body = inlineProjectAssets(entryHtml.content || '', getNodePath(entryHtml, fileTree), filesMap, 'html');
                        body = body.replace(/<link\b[^>]*rel=["']?stylesheet["']?[^>]*>/gi, '');
                        const styleTag = `<style data-src="${escapeHTML(openPath)}">${inlinedCss}</style>`;
                        body = injectIntoHead(body, styleTag + CONSOLE_CATCH_SCRIPT);
                        compiledSource = body;
                    } else {
                        compiledSource = `
                            <!DOCTYPE html>
                            <html>
                            <head><style>body{margin:0;background:#0D0F13;}${inlinedCss}</style></head>
                            <body>
                                <div class="glowing-element" style="width:140px;height:140px;border-radius:50px;background:radial-gradient(circle, #C5A059 0%, #16191E 100%);margin:40px auto;box-shadow:0 0 40px rgba(197,160,89,.4);"></div>
