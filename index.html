                                <div style="font-family: 'Inter', sans-serif; text-align: center; margin-top: 20px; color: #6B727E; font-size: 11px;">No index.html in project — showing standalone style preview</div>
                            </body>
                            </html>
                        `;
                    }

                } else if (SCRIPT_LANGS.includes(activeLanguage)) {
                    badge = activeLanguage === 'javascript' ? 'javascript · sandbox' : `${activeLanguage} · babel transpiled`;
                    const entryHtml = findEntryHtmlFile(filesMap);
                    const transpiled = transpileScript(editorValue, activeLanguage);
                    const needsReact = (activeLanguage === 'jsx' || activeLanguage === 'tsx');
                    const reactCDN = `
                        <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"><\/script>
                        <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"><\/script>
                    `;

                    if (transpiled.error) {
                        compiledSource = buildErrorSandbox(activeLanguage, transpiled.error, editorValue);
                    } else if (entryHtml) {
                        let body = inlineProjectAssets(entryHtml.content || '', getNodePath(entryHtml, fileTree), filesMap, 'html');
                        let headInjection = CONSOLE_CATCH_SCRIPT;
                        if (needsReact && !/react(\.development|\.production)?\.min\.js|react@/.test(body)) {
                            headInjection = reactCDN + headInjection;
                        }
                        body = injectIntoHead(body, headInjection);
                        const scriptTag = `<script>\n${transpiled.code}\n<\/script>`;
                        body = injectBeforeBodyEnd(body, scriptTag);
                        compiledSource = body;
                    } else {
                        compiledSource = `
                            <!DOCTYPE html>
                            <html>
                            <head>
                                ${needsReact ? reactCDN : ''}
                                ${CONSOLE_CATCH_SCRIPT}
                                <style>body{margin:0;background:#0D0F13;font-family:'Inter',sans-serif;}</style>
                            </head>
                            <body>
                                <div style="font-family: 'JetBrains Mono', monospace; padding: 12px; font-size: 12px; color: #E1E4E8; background: #16191E; border-radius: 8px; border: 1px solid rgba(225,228,232,0.1);">
                                    <div style="color: #C5A059; font-weight: bold; margin-bottom: 6px;">⚙️ ${activeLanguage.toUpperCase()} Execution Sandbox</div>
                                    <div style="color: #6B727E;">Logs render live in the console below. ${needsReact ? 'React + ReactDOM are preloaded — render into #root.' : 'Add a root element to render UI here.'}</div>
                                    <div id="root" style="margin-top:10px;"></div>
                                    <div id="app" style="margin-top:10px;"></div>
                                </div>
                                <script>${transpiled.code}<\/script>
                            </body>
                            </html>
                        `;
                    }

                } else if (activeLanguage === 'python') {
                    badge = 'python · pyodide';
                    compiledSource = buildPythonSandbox(editorValue);

                } else if (activeLanguage === 'json') {
                    badge = 'json · viewer';
                    compiledSource = buildJsonSandbox(editorValue);

                } else if (activeLanguage === 'yaml') {
                    badge = 'yaml · viewer';
                    compiledSource = buildYamlSandbox(editorValue);

                } else if (activeLanguage === 'sql') {
                    badge = 'sql · sqlite (in-browser)';
                    compiledSource = buildSqlSandbox(editorValue);

                } else if (activeLanguage === 'markup') {
                    badge = 'markdown · rendered';
                    compiledSource = buildMarkdownSandbox(editorValue);

                } else if (activeLanguage === 'xml') {
                    badge = 'xml · viewer';
                    compiledSource = buildXmlSandbox(editorValue);

                } else {
                    // bash, c, cpp, java, go, rust, php, ruby, csharp, plaintext, etc.
                    badge = `${activeLanguage} · source preview (not executable in-browser)`;
                    compiledSource = buildGenericSourceSandbox(editorValue, activeLanguage, openFile.name);
                }

                document.getElementById('preview-mode-badge').textContent = badge;
                liveIframe.srcdoc = compiledSource;
                iframeLoader.classList.add('hidden');
            }, 400);
        }

        // ---- Transpile / runtime error display ----
        function buildErrorSandbox(lang, message, code) {
            return `
                <!DOCTYPE html>
                <html>
                <head><style>
                    body { font-family: 'JetBrains Mono', monospace; padding: 16px; background: #0D0F13; color: #E1E4E8; font-size: 12px; margin:0; }
                    .title { color: #C5A059; font-weight: bold; margin-bottom: 8px; }
                    pre { white-space: pre-wrap; word-break: break-word; color: #C5A059; background:#16191E; padding:10px; border-radius:8px; }
                </style></head>
                <body>
                    <div class="title">❌ ${lang.toUpperCase()} transpile error</div>
                    <pre>${escapeHTML(message)}</pre>
                </body>
                </html>
            `;
        }

        // ---- Python execution via Pyodide (WASM CPython in-browser) ----
        function buildPythonSandbox(code) {
            const escapedCode = JSON.stringify(code);
            return `
                <!DOCTYPE html>
                <html>
                <head>
                    <style>
                        body { font-family: 'JetBrains Mono', monospace; padding: 14px; font-size: 12px; color: #6B727E; background: #0D0F13; margin:0; }
                        #status { color: #C5A059; font-weight: bold; margin-bottom: 8px; }
                        #out { white-space: pre-wrap; color: #E1E4E8; }
                        .err { color: #C5A059; }
                    </style>
                </head>
                <body>
                    <div id="status">🐍 Booting Python runtime (Pyodide)…</div>
                    <div id="out"></div>
                    ${CONSOLE_CATCH_SCRIPT}
                    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"><\/script>
                    <script>
                        const statusEl = document.getElementById('status');
                        const outEl = document.getElementById('out');

                        async function main() {
                            try {
                                const pyodide = await loadPyodide();
                                statusEl.textContent = '🐍 Running script…';

                                pyodide.setStdout({ batched: (s) => {
                                    outEl.textContent += s + "\\n";
                                    console.log(s);
                                }});
                                pyodide.setStderr({ batched: (s) => {
                                    outEl.innerHTML += '<span class="err">' + s.replace(/</g,'&lt;') + '</span>\\n';
                                    console.error(s);
                                }});

                                const code = ${escapedCode};
                                await pyodide.runPythonAsync(code);
                                statusEl.textContent = '✅ Execution finished';
                            } catch (err) {
                                statusEl.textContent = '❌ Execution failed';
                                outEl.innerHTML += '<span class="err">' + String(err).replace(/</g,'&lt;') + '</span>';
                                console.error(String(err));
                            }
                        }
                        main();
                    <\/script>
                </body>
                </html>
            `;
        }

        // ---- JSON pretty viewer ----
        function buildJsonSandbox(code) {
            let pretty = code;
            let valid = true;
            try { pretty = JSON.stringify(JSON.parse(code), null, 2); } catch (e) { valid = false; }
            return `
                <!DOCTYPE html>
                <html>
                <head><style>
                    body { font-family: 'JetBrains Mono', monospace; padding: 16px; background: #0D0F13; color: #E1E4E8; font-size: 12px; margin:0; }
                    .status { margin-bottom: 10px; font-weight: bold; color: ${valid ? '#E1E4E8' : '#C5A059'}; }
                    pre { white-space: pre-wrap; word-break: break-all; }
                </style></head>
                <body>
                    <div class="status">${valid ? '✅ Valid JSON' : '❌ Invalid JSON — showing raw content'}</div>
                    <pre>${escapeHTML(pretty)}</pre>
                </body>
                </html>
            `;
        }

        // ---- YAML viewer (parses with js-yaml, shows resulting structure) ----
        function buildYamlSandbox(code) {
            const escapedCode = JSON.stringify(code);
            return `
                <!DOCTYPE html>
                <html>
                <head><style>
                    body { font-family: 'JetBrains Mono', monospace; padding: 16px; background: #0D0F13; color: #E1E4E8; font-size: 12px; margin:0; }
                    .status { margin-bottom: 10px; font-weight: bold; }
                    .ok { color: #E1E4E8; } .bad { color: #C5A059; }
                    pre { white-space: pre-wrap; word-break: break-word; }
                </style></head>
                <body>
                    <div id="status" class="status">Parsing YAML…</div>
                    <pre id="out"></pre>
                    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"><\/script>
                    <script>
                        const statusEl = document.getElementById('status');
                        const outEl = document.getElementById('out');
                        const src = ${escapedCode};
                        try {
                            const data = jsyaml.load(src);
                            statusEl.textContent = '✅ Valid YAML — parsed structure:';
                            statusEl.className = 'status ok';
                            outEl.textContent = JSON.stringify(data, null, 2);
                        } catch (err) {
                            statusEl.textContent = '❌ YAML parse error';
                            statusEl.className = 'status bad';
                            outEl.textContent = String(err);
                        }
                    <\/script>
                </body>
                </html>
            `;
        }

        // ---- SQL execution via sql.js (in-memory SQLite) ----
        function buildSqlSandbox(code) {
            const escapedCode = JSON.stringify(code);
            return `
                <!DOCTYPE html>
                <html>
                <head><style>
                    body { font-family: 'JetBrains Mono', monospace; padding: 14px; background: #0D0F13; color: #E1E4E8; font-size: 12px; margin:0; }
                    .status { color: #C5A059; font-weight: bold; margin-bottom: 10px; }
                    table { border-collapse: collapse; margin-bottom: 16px; font-size: 11px; width: 100%; }
                    th, td { border: 1px solid #16191E; padding: 4px 8px; text-align: left; }
                    th { background: #16191E; color: #C5A059; }
                    tr:nth-child(even) { background: #16191E; }
                    .err { color: #C5A059; white-space: pre-wrap; }
                    .meta { color: #6B727E; margin-bottom: 6px; }
                </style></head>
                <body>
                    <div class="status">🗄️ Booting SQLite (sql.js)…</div>
                    <div id="results"></div>
                    ${CONSOLE_CATCH_SCRIPT}
                    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"><\/script>
                    <script>
                        const resultsEl = document.getElementById('results');
                        const statusEl = document.querySelector('.status');

                        function renderTable(columns, values) {
                            let html = '<table><thead><tr>' + columns.map(c => '<th>' + c + '</th>').join('') + '</tr></thead><tbody>';
                            for (const row of values) {
                                html += '<tr>' + row.map(v => '<td>' + (v === null ? '<i>NULL</i>' : String(v)) + '</td>').join('') + '</tr>';
                            }
                            html += '</tbody></table>';
                            return html;
                        }

                        async function main() {
                            try {
                                const SQL = await initSqlJs({ locateFile: f => 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/' + f });
                                const db = new SQL.Database();
                                statusEl.textContent = '✅ SQLite ready — executing script…';

                                const sql = ${escapedCode};
                                let resultSets = [];
                                try {
                                    resultSets = db.exec(sql);
                                } catch (execErr) {
                                    resultsEl.innerHTML += '<div class="err">' + String(execErr).replace(/</g,'&lt;') + '</div>';
                                    console.error(String(execErr));
                                }

                                if (resultSets.length === 0) {
                                    resultsEl.innerHTML += '<div class="meta">Query executed successfully — no result sets returned (e.g. CREATE/INSERT/UPDATE).</div>';
                                    console.log('SQL executed — no SELECT result sets.');
                                } else {
                                    resultSets.forEach((rs, idx) => {
                                        resultsEl.innerHTML += '<div class="meta">Result set ' + (idx+1) + ' (' + rs.values.length + ' rows)</div>' + renderTable(rs.columns, rs.values);
                                        console.log('Result set ' + (idx+1) + ': ' + rs.values.length + ' rows');
                                    });
                                }
                                statusEl.textContent = '✅ Execution finished';
                            } catch (err) {
                                statusEl.textContent = '❌ SQLite failed to load';
                                resultsEl.innerHTML += '<div class="err">' + String(err).replace(/</g,'&lt;') + '</div>';
                                console.error(String(err));
                            }
                        }
                        main();
                    <\/script>
                </body>
                </html>
            `;
        }

        // ---- XML viewer ----
        function buildXmlSandbox(code) {
            const escapedCode = JSON.stringify(code);
            return `
                <!DOCTYPE html>
                <html>
                <head><style>
                    body { font-family: 'JetBrains Mono', monospace; padding: 16px; background: #0D0F13; color: #E1E4E8; font-size: 12px; margin:0; }
                    .status { margin-bottom: 10px; font-weight: bold; }
                    .ok { color: #E1E4E8; } .bad { color: #C5A059; }
                    pre { white-space: pre-wrap; word-break: break-word; }
                </style></head>
                <body>
                    <div id="status" class="status">Parsing XML…</div>
                    <pre id="out"></pre>
                    <script>
                        const src = ${escapedCode};
                        const statusEl = document.getElementById('status');
                        const outEl = document.getElementById('out');
                        try {
                            const parser = new DOMParser();
                            const doc = parser.parseFromString(src, 'application/xml');
                            const errNode = doc.querySelector('parsererror');
                            if (errNode) {
                                statusEl.textContent = '❌ XML parse error';
                                statusEl.className = 'status bad';
                                outEl.textContent = errNode.textContent;
                            } else {
                                statusEl.textContent = '✅ Valid XML';
                                statusEl.className = 'status ok';
                                outEl.textContent = src;
                            }
                        } catch (err) {
                            statusEl.textContent = '❌ XML parse error';
                            statusEl.className = 'status bad';
                            outEl.textContent = String(err);
                        }
                    <\/script>
                </body>
                </html>
            `;
        }

        // ---- Markdown renderer ----
        function buildMarkdownSandbox(code) {
            const markdownTextClean = code
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/```([\s\S]*?)```/g, (m, c) => `<pre style="background:#16191E;color:#E1E4E8;padding:10px;border-radius:8px;overflow:auto;">${c}</pre>`)
                .replace(/\n/g, '<br>')
                .replace(/# (.*)/g, '<h1 style="color: #C5A059; border-bottom: 1px solid rgba(225,228,232,0.15); padding-bottom: 4px; font-family: \'Inter\', sans-serif;">$1</h1>')
                .replace(/## (.*)/g, '<h2 style="color: #E1E4E8; font-family: \'Inter\', sans-serif;">$1</h2>')
                .replace(/### (.*)/g, '<h3 style="color: #C5A059; font-family: \'Inter\', sans-serif;">$1</h3>')
                .replace(/\*\*(.*?)\*\*/g, '<strong style="color:#E1E4E8;">$1</strong>')
                .replace(/- (.*)/g, '<li style="margin-left: 12px; font-family: \'Inter\', sans-serif; color: #6B727E;">$1</li>');

            return `
                <!DOCTYPE html>
                <html>
                <head>
                    <style>body { padding: 20px; color: #E1E4E8; background: #0D0F13; line-height: 1.6; font-family: 'Inter', sans-serif; }</style>
                </head>
                <body>
                    <div>${markdownTextClean}</div>
                </body>
                </html>
            `;
        }

        // ---- Generic syntax-highlighted source preview for compiled / non-browser languages ----
        const GENERIC_PRISM_COMPONENTS = {
            bash: 'bash', c: 'c', cpp: 'cpp', java: 'java', go: 'go', rust: 'rust',
            php: 'php', ruby: 'ruby', csharp: 'csharp', plaintext: null
        };

        function buildGenericSourceSandbox(code, lang, filename) {
            const escapedCode = JSON.stringify(code);
            const prismLang = PRISM_LANG_MAP[lang] || 'language-none';
            const component = GENERIC_PRISM_COMPONENTS[lang];
            const componentScript = component
                ? `<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-${component}.min.js"><\/script>`
                : '';

            return `
                <!DOCTYPE html>
                <html>
                <head>
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
                    <style>
                        body { margin:0; padding: 14px; background: #0D0F13; font-family: 'JetBrains Mono', monospace; }
                        .banner { color: #6B727E; font-size: 11px; margin-bottom: 10px; padding: 8px 10px; background: #16191E; border-radius: 8px; border: 1px solid rgba(225,228,232,0.08); }
                        .banner b { color: #C5A059; }
                        pre { margin: 0; border-radius: 8px; font-size: 12px; max-height: calc(100vh - 90px); overflow:auto; background:#16191E !important; }
                        code[class*="language-"], pre[class*="language-"] { color: #E1E4E8 !important; text-shadow:none !important; font-family: 'JetBrains Mono', monospace !important; }
                        .token.comment, .token.prolog, .token.doctype, .token.cdata, .token.punctuation { color: #6B727E !important; }
                        .token.property, .token.tag, .token.boolean, .token.number, .token.constant, .token.symbol,
                        .token.deleted, .token.function, .token.class-name, .token.selector, .token.attr-name,
                        .token.keyword, .token.operator, .token.entity, .token.url, .token.variable, .token.builtin,
                        .token.important, .token.atrule { color: #C5A059 !important; }
                        .token.string, .token.char, .token.inserted, .token.regex { color: #E1E4E8 !important; }
                    </style>
                </head>
                <body>
                    <div class="banner"><b>${escapeHTML(filename)}</b> — ${lang} is not executed in-browser. Showing a syntax-highlighted source preview. Download the file to compile/run it locally.</div>
                    <pre><code class="${prismLang}" id="code-block"></code></pre>
                    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"><\/script>
                    ${componentScript}
                    <script>
                        document.getElementById('code-block').textContent = ${escapedCode};
                        if (window.Prism) Prism.highlightElement(document.getElementById('code-block'));
                    <\/script>
                </body>
                </html>
            `;
        }

        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'IFRAME_CONSOLE') {
                if (virtualConsole.querySelector('.italic')) {
                    virtualConsole.innerHTML = '';
                }

                const logItem = document.createElement('div');
                const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

                logItem.className = 'py-0.5 border-b border-ink/10 flex items-start gap-2.5';

                let textClass = 'text-ink';
                let icon = '⚡';
                if (event.data.logType === 'error') {
                    textClass = 'text-accent';
                    icon = '❌';
                } else if (event.data.logType === 'warn') {
                    textClass = 'text-accent';
                    icon = '⚠️';
                }

                logItem.innerHTML = `
                    <span class="text-muted shrink-0 select-none">${timeStr}</span>
                    <span class="shrink-0">${icon}</span>
                    <span class="${textClass} flex-1 font-semibold leading-relaxed whitespace-pre-wrap">${event.data.message}</span>
                `;
                virtualConsole.appendChild(logItem);
                virtualConsole.scrollTop = virtualConsole.scrollHeight;
            }
        });

        // ============================== TOASTS ==============================
        function triggerToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `p-3.5 rounded-xl text-xs font-semibold shadow-lg shadow-canvas/40 text-ink pointer-events-auto transition-all duration-300 transform translate-y-2 opacity-0 flex items-center gap-2 border bg-surface border-ink/10`;

            if (type === 'success') {
                toast.innerHTML = `<i class="fa-solid fa-circle-check text-base text-accent"></i> ${message}`;
            } else {
                toast.innerHTML = `<i class="fa-solid fa-circle-info text-base text-muted"></i> ${message}`;
            }

            toastContainer.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 50);

            setTimeout(() => {
                toast.classList.add('opacity-0', 'scale-95');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 3000);
        }

        // ============================== TOOLBAR EVENTS ==============================
        btnRun.addEventListener('click', () => {
            runLiveSandbox();
            triggerToast('Source compiled & executed inside Sandbox!', 'success');
        });

        btnRefreshPreview.addEventListener('click', () => {
            runLiveSandbox();
            triggerToast('Preview state reloaded.', 'info');
        });

        btnTogglePreview.addEventListener('click', () => {
            previewPanel.classList.toggle('hidden');
            triggerToast('Workspace panels adjusted', 'info');
        });

        btnDownload.addEventListener('click', () => {
            if (!openFile) return;
            const blob = new Blob([editingArea.value], { type: 'text/plain;charset=utf-8' });
            const tempUrl = URL.createObjectURL(blob);
            const downloadAnchor = document.createElement('a');

            downloadAnchor.href = tempUrl;
            downloadAnchor.download = openFile.name || 'code_aura.txt';
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            document.body.removeChild(downloadAnchor);
            URL.revokeObjectURL(tempUrl);
            triggerToast('File download started successfully!', 'success');
        });

        btnCopy.addEventListener('click', () => {
            const textareaCopy = document.createElement('textarea');
            textareaCopy.value = editingArea.value;
            document.body.appendChild(textareaCopy);
            textareaCopy.select();
            document.execCommand('copy');
            document.body.removeChild(textareaCopy);
            triggerToast('Source code copied to clipboard!', 'success');
        });

        btnToggleSidebar.addEventListener('click', () => {
            fileSidebar.classList.add('-ml-64');
            btnShowSidebar.classList.remove('hidden');
        });

        btnShowSidebar.addEventListener('click', () => {
            fileSidebar.classList.remove('-ml-64');
            btnShowSidebar.classList.add('hidden');
        });

        // Custom File Imports handler - adds files to current folder (root)
        fileUploadInput.addEventListener('change', async (event) => {
            const files = Array.from(event.target.files || []);
            if (!files.length) return;

            for (const file of files) {
                await importFile(file);
            }
            fileUploadInput.value = '';
        });

        function importFile(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = async function (e) {
                    let name = file.name;
                    if (siblingNameExists(fileTree, name)) {
                        name = `${Date.now()}_${name}`;
                    }
                    const newFile = makeFile(name, e.target.result);
                    fileTree.children.push(newFile);
                    renderFileTree();
                    await saveTree();
                    openFileInEditor(newFile);
                    triggerToast(`Imported ${file.name} successfully!`, 'success');
                    resolve();
                };
                reader.readAsText(file);
            });
        }

        btnClearConsole.addEventListener('click', () => {
            virtualConsole.innerHTML = '<div class="text-muted italic">Logs cleared. Press "Run Live" to evaluate script...</div>';
            triggerToast('Sandbox terminal output cleared', 'info');
        });

        // ============================== SETTINGS ==============================
        btnSettings.addEventListener('click', () => {
            settingsDrawer.classList.remove('translate-x-full');
        });

        btnCloseSettings.addEventListener('click', () => {
            settingsDrawer.classList.add('translate-x-full');
        });

        fontSizeControl.addEventListener('input', async (e) => {
            editorFontSize = parseInt(e.target.value);
            fontSizeDisplay.textContent = `${editorFontSize}px`;
            await saveSetting('font_size', editorFontSize);
            updateEditorProperties();
        });

        tabSizeControl.addEventListener('change', async (e) => {
            tabSpaces = parseInt(e.target.value);
            await saveSetting('tab_size', tabSpaces);
            updateEditorProperties();
            handleEditingSyntax();
        });

        toggleAutoclose.addEventListener('change', async (e) => {
            autocloseEnabled = e.target.checked;
            await saveSetting('autoclose', autocloseEnabled);
            triggerToast(autocloseEnabled ? 'Bracket auto-closing enabled' : 'Bracket auto-closing disabled', 'info');
        });

        toggleAutosave.addEventListener('change', async (e) => {
            autosaveEnabled = e.target.checked;
            await saveSetting('autosave', autosaveEnabled);
            triggerToast(autosaveEnabled ? 'Draft autosave enabled' : 'Draft autosave disabled', 'info');
        });

        btnResetPreferences.addEventListener('click', async () => {
            const ok = await confirmDialog('Reset Preferences', 'Reset editor preferences (font size, tab size, theme, etc.) to defaults? Your projects and files will be kept.');
            if (!ok) return;

            for (const key of ['tab_size', 'font_size', 'autoclose', 'autosave']) {
                await idbDelete('settings', key);
            }

            triggerToast('Preferences reset. Reloading...', 'info');
            setTimeout(() => {
                window.location.reload();
            }, 800);
        });

        // ============================== DRAG & DROP ==============================
        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', async (e) => {
            e.preventDefault();
            const files = Array.from(e.dataTransfer.files || []);
            if (files.length > 0) {
                for (const file of files) {
                    await importFile(file);
                }
            }
        });

        // Safety net: flush any pending edits to IndexedDB before the page unloads,
        // regardless of the autosave setting or debounce timer.
        window.addEventListener('beforeunload', () => {
            if (openFile) {
                openFile.content = editingArea.value;
            }
            if (saveDebounceTimer) clearTimeout(saveDebounceTimer);
            saveTree();
        });

        // ============================== INITIALIZATION ==============================
        async function initApp() {
            await openDB();

            tabSpaces = await loadSetting('tab_size', 4);
            tabSizeControl.value = tabSpaces.toString();

            editorFontSize = await loadSetting('font_size', 14);
            fontSizeControl.value = editorFontSize.toString();
            fontSizeDisplay.textContent = `${editorFontSize}px`;

            autocloseEnabled = await loadSetting('autoclose', true);
            toggleAutoclose.checked = autocloseEnabled;

            autosaveEnabled = await loadSetting('autosave', true);
            toggleAutosave.checked = autosaveEnabled;

            updateEditorProperties();
            setupKeyboardHandlers();
            setupSynchronizedScrolling();

            await initProjects();
        }

        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
